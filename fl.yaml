                    chown -R ubuntu:ubuntu /home/ubuntu/.ssh
                    chmod 700 /home/ubuntu/.ssh
                    chmod 600 /home/ubuntu/.ssh/authorized_keys

                    cd /home/ubuntu/
                    git clone https://github.com/dsquarre/SmartMonitoring.git SmartMonitoring
                    chown -R ubuntu:ubuntu .
                    cd SmartMonitoring/client
                    echo "rickroll" > psswd.txt
                    echo "https://${Server.PublicIp}:8000" > url.txt
                    python3 -m venv venv
                    venv/bin/pip3 install -r requirements.txt
